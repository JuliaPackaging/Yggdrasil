name: Update Manifest

on:
  workflow_dispatch:

# Do not use PkgServer to make sure we have the latest registry
env:
  JULIA_PKG_SERVER: ""

jobs:
  update_manifest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: julia-actions/setup-julia@4a12c5f801ca5ef0458bba44687563ef276522dd # v3.0.0
        with:
          version: '1.12.4' # Use the version of Julia used on the build machine
          arch: x64
      - uses: julia-actions/cache@9a93c5fb3e9c1c20b60fc80a478cae53e38618a4 # v3.0.2
        with:
          cache-registries: "true"
          cache-compiled: "true"
      - name: Instantiate the manifest
        shell: julia --project=.ci --color=yes {0}
        run: |
          using Pkg
          Pkg.instantiate()
          Pkg.precompile()
      - name: Generate commit message
        run: julia --project=.ci --color=yes .ci/update_manifest.jl
        id: commit_message
      - name: Show git status
        run: git status
      - uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          delete-branch: true
          branch: 'gha/update-manifest'
          commit-message: ${{ env.commit_message }}
          title: ${{ env.commit_title }}
          body: ${{ env.commit_body }}
          labels: |
            meta :deciduous_tree:
