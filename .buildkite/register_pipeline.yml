# Steps for the `yggdrasil-register` pipeline.
#
# This pipeline is triggered by the main `yggdrasil` pipeline (see
# `trigger_registration_step` in `.buildkite/utils.jl`) once all builds of a
# project have finished.  It is kept separate so that the `GITHUB_TOKEN` secret --
# used to push the JLL packages and create the GitHub releases -- is only
# readable from this trusted pipeline and never from the build steps that run
# (potentially untrusted) `build_tarballs.jl` code.
#
# Set the `yggdrasil-register` pipeline's webUI step to:
#     buildkite-agent pipeline upload .buildkite/register_pipeline.yml
#
# The `NAME`, `PROJECT`, `SKIP_BUILD`, `BUILD_ID` (and the registry/pkg-server)
# environment variables are supplied by the triggering build.
steps:
  - label: "access secrets"
    agents:
      queue: "yggdrasil"
      arch: "x86_64"
      os: "linux"
      sandbox_capable: "true"
    command: echo ${GITHUB_TOKEN} 
    secrets:
      - GITHUB_TOKEN
